name: Playwright Regression

on:
  schedule:
    - cron: '17 6 * * 2,5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-regression:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - suite: battle-royale
            specs: e2e/battle-royale.spec.ts
            long-soak: 'false'
          - suite: core-match
            specs: e2e/chaos-props.spec.ts e2e/full-match.spec.ts e2e/toy-test.spec.ts e2e/wrestling-upgrade.spec.ts
            long-soak: 'false'
          - suite: physics-playability
            specs: e2e/physics-lab.spec.ts e2e/playability-regressions.spec.ts e2e/primary-actions-smoke.spec.ts e2e/guard-smoke.spec.ts
            long-soak: 'false'
          - suite: device-inputs
            specs: e2e/device-inputs.spec.ts e2e/mobile-controls.spec.ts
            long-soak: 'false'
          - suite: rematch-soak
            specs: e2e/rematch-soak.spec.ts
            long-soak: 'false'
          - suite: five-minute-soak
            specs: e2e/five-minute-soak.spec.ts
            long-soak: 'true'
    env:
      CI: 'true'
      PLAYWRIGHT_SUITE: ${{ matrix.suite }}
      RUN_LONG_SOAK: ${{ matrix.long-soak }}
      BODYWORKS_SOAK_MS: '300000'
    steps:
      - name: Check out main
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production preview
        run: pnpm build

      - name: Run ${{ matrix.suite }}
        run: pnpm exec playwright test ${{ matrix.specs }}

      - name: Publish browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.suite }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Write run summary
        if: always()
        run: |
          echo "### Ringfall Playwright: ${{ matrix.suite }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Specs: \`${{ matrix.specs }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Evidence artifact: \`playwright-${{ matrix.suite }}-${{ github.run_attempt }}\`" >> "$GITHUB_STEP_SUMMARY"
